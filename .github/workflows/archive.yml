name: Archive Perth Priority Removals

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 1 * *"

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Test homepage fetch
        run: |
          echo "Normal HEAD request"
          curl -I https://perthpriorityremovals.com.au
          echo ""
          echo "Archive save endpoint test"
          curl -I https://web.archive.org

      - name: Run URL list archiver
        run: bash script/archive_urls.sh

      - name: Upload archive log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archive-log
          path: archive-log.txt
