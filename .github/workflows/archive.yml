name: Archive Perth Priority Removals

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 1 * *"

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Run Wayback archiver
        run: bundle exec ruby script/archive_ppr.rb
